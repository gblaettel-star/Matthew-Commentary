        "commentary": "<p>The inheritance is prepared from before creation — it is not earned by the acts of mercy but received by those whose heart has been so transformed by grace that mercy flows naturally from them. The acts of mercy (feeding the hungry, welcoming the stranger, visiting the imprisoned) are the evidence of belonging to the King, not the grounds for it. This is the Reformed distinction between justification (the ground of acceptance, which is Christ’s righteousness alone) and sanctification (the evidence of acceptance, which is the fruit of the Spirit producing love and mercy). The sheep do not know they have served the King: their mercy was natural, unself-conscious, the overflow of a transformed heart.</p>"
      },
      {
        "ref": "v. 40",
        "quote": "“As you did it to one of the least of these my brothers, you did it to me.”",
        "commentary": "<p>This is one of the most searching verses in the New Testament. Christ identifies himself with the suffering, the poor, the imprisoned, the stranger. To serve them is to serve him; to neglect them is to neglect him. The “brothers” most likely refers primarily to the messengers of the gospel (those who carry Christ to the nations), but the principle extends to all who suffer — because Christ has so united himself with human suffering in the incarnation that what is done to the vulnerable is done to him. The church that cares for the least is not doing social work as a supplement to the gospel; it is encountering Christ in the place he has chosen to be encountered.</p>"
      },
      {
        "ref": "v. 46",
        "quote": "“These will go away into eternal punishment, but the righteous into eternal life.”",
        "commentary": "<p>The symmetry of verse 46 demands that “eternal life” and “eternal punishment” be understood in the same way: if one is everlasting, so is the other. Jesus does not soften the doctrine of eternal judgment; he states it with the same direct authority as the doctrine of eternal life. Hell is not annihilation — it is active punishment, eternal separation from the joy of the master. This is not sadism but justice: those who have refused to love the King or those he loves reap what they have chosen. The seriousness of hell is the measure of the love that was rejected. Matthew 25 ends not with a question but with a verdict — and the entire Gospel has been preparing us to receive it rightly.</p>"
      }
    ],
    "theology": "<p><strong>Faith and works in the final judgment.</strong> The parable of the sheep and goats is sometimes misread as teaching salvation by charity. It teaches the opposite: those who are blessed by the Father (elect from the foundation of the world, v. 34) demonstrate their status through the fruit of mercy. Works do not earn salvation; they reveal it. James and Paul are not in contradiction: Paul says we are justified by faith alone (Rom 3:28); James says a faith without works is dead (Jas 2:26). Matthew 25 stands with James: the living faith that justifies is the faith that produces mercy. The absence of mercy is evidence not of an imperfect Christian but of a heart that has never truly encountered the merciful King.</p>",
    "examples": "<p><strong>Then:</strong> The early church was remarkable for its care of the poor, the sick, the orphan, and the widow — in a culture that largely left the vulnerable to die. Pagans observed and were astonished. The church was not performing charity as a strategy; it was loving Christ in the face of the neighbour. The Roman emperor Julian complained: “The godless Galileans feed not only their own poor but ours also.”</p><p><strong>Now:</strong> The parable of the talents is a rebuke of every Christian who sits on their gifts out of fear — fear of failure, fear of criticism, fear of the cost. Every person reading these words has been entrusted with something by the master: a relationship, a skill, a platform, a message, an opportunity. The question at the end will not be “how much did you have?” but “what did you do with what you were given?” Faithfulness, not magnitude, is the measure.</p>"
  },
  "26": {
    "ref": "Chapter 26",
    "title": "The Last Supper and Gethsemane",
    "text": "<sup>26</sup>Now as they were eating, Jesus took bread, and after blessing it broke it and gave it to the disciples, and said, “Take, eat; this is my body.” <sup>27</sup>And he took a cup, and when he had given thanks he gave it to them, saying, “Drink of it, all of you, <sup>28</sup>for this is my blood of the covenant, which is poured out for many for the forgiveness of sins. <sup>29</sup>I tell you I will not drink again of this fruit of the vine until that day when I drink it new with you in my Father’s kingdom.” <sup>39</sup>And going a little farther he fell on his face and prayed, saying, “My Father, if it be possible, let this cup pass from me; nevertheless, not as I will, but as you will.” <sup>53</sup>Do you think that I cannot appeal to my Father, and he will at once send me more than twelve legions of angels? <sup>54</sup>But how then should the Scriptures be fulfilled, that it must be so? <sup>63</sup>But Jesus remained silent. And the high priest said to him, “I adjure you by the living God, tell us if you are the Christ, the Son of God.” <sup>64</sup>Jesus said to him, “You have said so. But I tell you, from now on you will see the Son of Man seated at the right hand of Power and coming on the clouds of heaven.”",
    "overview": "<p>Chapter 26 is the most theologically dense chapter in Matthew. In a single evening Jesus institutes the Lord’s Supper, reveals his betrayer, predicts Peter’s denial, agonises in Gethsemane, is arrested by a crowd with swords, and is condemned by the Sanhedrin. Every scene is simultaneously the action of history and the fulfilment of Scripture: Judas’ betrayal for thirty pieces of silver (Zech 11:12–13), the scattering of the disciples (Zech 13:7), the suffering servant (Isa 53), the enthroned Son of Man (Dan 7:13).</p><p>Gethsemane is the chapter’s theological centre. Jesus does not walk to the cross with stoic detachment; he falls on his face and prays that the cup might pass. His agony is real — the weight of the wrath of God against sin, the drinking of the cup of Jeremiah 25 and Isaiah 51, the bearing of the curse. And then: “not as I will, but as you will.” This is the most perfect prayer ever prayed — complete honesty about human desire, complete submission to divine will. The cross is not the defeat of the Son; it is the triumph of obedience.</p>",
    "verseByVerse": [
      {
        "ref": "vv. 26–28",
        "quote": "“This is my blood of the covenant, which is poured out for many for the forgiveness of sins.”",
        "commentary": "<p>The institution of the Lord’s Supper reinterprets the Passover. The Passover recalled the blood of the lamb that protected Israel from the angel of death in Egypt; Jesus declares that his blood establishes the new covenant (Jer 31:31–34), poured out for the forgiveness of sins. “For many” echoes Isaiah 53:12 — the servant bearing the sin of many. The Lord’s Supper is thus the Passover of the new exodus: as Israel was delivered from Egypt through the blood of the lamb, the new people of God are delivered from sin and death through the blood of the Lamb. Every celebration of the Supper proclaims the same message until he comes (1 Cor 11:26).</p>"
      },
      {
        "ref": "v. 39",
        "quote": "“My Father, if it be possible, let this cup pass from me; nevertheless, not as I will, but as you will.”",
        "commentary": "<p>The prayer of Gethsemane is the most intimate moment in the Gospels — the Son in unmediated conversation with the Father in the darkness of the garden. The cup is the cup of divine wrath (Isa 51:17, 22; Jer 25:15): the full accumulated judgment of God against all human sin, which Jesus is about to drink on behalf of his people. His request that it might pass is not weakness but humanity: no sinless human being could contemplate such a thing without recoiling. His submission — “not as I will, but as you will” — is the greatest act of obedience in history. The second Adam succeeds where the first Adam failed: faced with a terrible choice in a garden, he submits to the Father rather than grasping at his own will.</p>"
      },
      {
        "ref": "vv. 53–54",
        "quote": "“Do you think that I cannot appeal to my Father, and he will at once send me more than twelve legions of angels?”",
        "commentary": "<p>At the arrest, Jesus reveals the full freedom of his submission. He is not a passive victim; he is the sovereign who chooses the cross. Twelve legions of angels — seventy-two thousand — are available at a word. He speaks the word not to call them but to refuse to call them, because the Scriptures must be fulfilled. This is active obedience at its most dramatic: not coercion but willing surrender, not weakness but the strength that refuses the easy escape. The cross is not the place where God’s purposes were thwarted; it is the place where they were perfectly accomplished by the willing, loving, obedient Son.</p>"

        "commentary": "<p>Before the high priest, Jesus is asked directly: are you the Christ, the Son of God? His answer is the fullest self-disclosure in Matthew. He confirms the title and adds Daniel 7:13 and Psalm 110:1: from this point forward, the Son of Man will be enthroned at the right hand of the Power and will come on the clouds. The very condemnation he receives — blasphemy, worthy of death (v. 66) — is the fulfilment of his mission: he must be condemned by the council so that he can bear condemnation for all who trust him. The judge in the dock is the true judge; the condemned is the one who will pronounce the final verdict.</p>"

        "quote": "“And he went out and wept bitterly.”",
        "commentary": "<p>Peter’s denial is the final scene of the chapter, and its emotional weight is deliberately placed at the end. He had sworn he would die before denying Jesus (v. 35). Three times, by a charcoal fire, he denies him — to a servant girl, to bystanders, with oaths and curses. The rooster crows. He remembers the word of Jesus. He goes out and weeps bitterly. The tears of Peter are the tears of every disciple who has discovered the weakness of their own resolve. His restoration (John 21) is as certain as his fall. The grace that predicted his denial is the same grace that will restore him. The cross that Peter cannot yet comprehend will be his redemption too.</p>"

    "theology": "<p><strong>The cup of wrath and substitutionary atonement.</strong> The cup that Jesus prays might pass in Gethsemane and then drinks on the cross is the Old Testament cup of divine wrath — the concentrated judgment of God against human sin. That he drinks it “for many” (26:28) and “for the forgiveness of sins” is Matthew’s clearest statement of penal substitutionary atonement: Christ in the place of sinners, bearing the penalty that was theirs, so that the forgiveness that is his might become theirs. This is the heart of the gospel — not merely that God loves us (though he does) or that Jesus shows us how to live (though he does) but that the holy God, in the person of his Son, absorbed the full penalty for human sin so that justice and mercy could be simultaneously satisfied at the cross.</p>",
    "examples": "<p><strong>Then:</strong> The disciples slept in Gethsemane while Jesus prayed. They could not watch one hour. Their failure is not recorded to condemn them but to reveal the bankruptcy of human resolve — and to show that the cross was accomplished not by the strength of the disciples but by the obedience of the Son, alone, in the dark, sustained only by the Father.</p><p><strong>Now:</strong> Every celebration of the Lord’s Supper is a proclamation of Gethsemane and the cross. The bread and cup carry the weight of that night — the betrayal, the agony, the submission, the arrest, the trial. To eat and drink worthily (1 Cor 11:27–29) is to remember not merely a past event but the present ground of our standing before God: his blood, poured out for many, for the forgiveness of sins. That includes every sin we brought to the table today.</p>"

  "27": {
    "ref": "Chapter 27",
    "title": "The Crucifixion of the King",
    "text": "<sup>29</sup>and twisting together a crown of thorns, they put it on his head and put a reed in his right hand. And kneeling before him, they mocked him, saying, “Hail, King of the Jews!” <sup>35</sup>And when they had crucified him, they divided his garments among them by casting lots. <sup>37</sup>And over his head they put the charge against him, which read, “This is Jesus, the King of the Jews.” <sup>45</sup>Now from the sixth hour there was darkness over all the land until the ninth hour. <sup>46</sup>And about the ninth hour Jesus cried out with a loud voice, saying, “Eli, Eli, lema sabachthani?” that is, “My God, my God, why have you forsaken me?” <sup>50</sup>And Jesus cried out again with a loud voice and yielded up his spirit. <sup>51</sup>And behold, the curtain of the temple was torn in two, from top to bottom. And the earth shook, and the rocks were split. <sup>54</sup>When the centurion and those who were with him, keeping watch over Jesus, saw the earthquake and what took place, they were afraid, and said, “Truly this man was the Son of God!” <sup>60</sup>and laid it in his own new tomb, which he had cut in the rock. And he rolled a great stone to the entrance of the tomb and went away.",
    "overview": "<p>Chapter 27 is the centre of the universe. Everything in the Old Testament moves toward it; everything in the New Testament moves from it. The crucifixion of Jesus of Nazareth, King of the Jews, is the event by which God reconciles a broken world to himself. Matthew narrates it with restraint — he does not linger on the physical agony of crucifixion — but saturates every scene with Old Testament allusion: Psalm 22 (the cry of dereliction, the dividing of garments, the mocking); Zechariah 11 (thirty pieces of silver); Isaiah 53 (numbered with transgressors, interceding for sinners).</p><p>The theological climax comes in three simultaneous signs at the moment of death: the tearing of the temple veil, the earthquake and split rocks, and the opening of tombs. The veil torn from top to bottom is God’s own act: the barrier between the holy and the profane is removed. The way into the presence of God is now open to all who come through the crucified King. The centurion’s confession — “Truly this man was the Son of God!” — is the Gentile answer to the question Jesus asked in chapter 16: spoken at the foot of the cross, by a soldier, at the moment of death.</p>",
    "verseByVerse": [
      {
        "ref": "vv. 29–31",
        "quote": "“Hail, King of the Jews!”",
        "commentary": "<p>The soldiers’ mockery is unwitting prophecy. They dress him in a scarlet robe, crown him with thorns, put a reed-sceptre in his hand, and bow in pretended homage. Every detail is simultaneously degradation and declaration: he is the King, this is his coronation, the cross is his throne. The crown of thorns reverses the curse of Genesis 3:17–18 (thorns and thistles are the ground’s curse); the King takes the curse on his own head. The reed that is taken and used to strike him (v. 30) is given back to him in glory as the sceptre of his eternal kingdom. They mock; the universe bows.</p>"
      },

        "ref": "vv. 45–46",
        "quote": "“My God, my God, why have you forsaken me?”",
        "commentary": "<p>The cry of dereliction is the most terrifying and the most precious verse in all of Scripture. Jesus quotes Psalm 22:1 — and he quotes it because it is true of his experience. The eternal Son, in whom the Father always delighted, is experiencing the withdrawal of the Father’s felt presence as he bears the full weight of human sin and divine wrath. This is not theatrics; it is the real cost of atonement. The one who knew no sin was made sin for us (2 Cor 5:21). The forsakenness he experienced is the forsakenness that we deserved — and because he bore it, we will never bear it. “My God, my God” — even in the darkness, he addresses the Father. This is the prayer of the forsaken one who does not stop praying.</p>"
      },
      {
        "ref": "v. 51",
        "quote": "“The curtain of the temple was torn in two, from top to bottom.”",
        "commentary": "<p>The temple veil separated the Holy Place from the Most Holy Place — the presence of God so holy that only the high priest could enter, and only once a year, with blood. The tearing of the veil at the moment of Jesus’ death is the greatest act of liturgical theology in history: the old sacrificial system has reached its end. The final sacrifice has been made, once for all. There is now no curtain between God and his people. The book of Hebrews draws the line: we have confidence to enter the Most Holy Place by the blood of Jesus (Heb 10:19–20). Every believer is now a priest. Every prayer goes through the torn veil. Access is direct, permanent, and free.</p>"
      },
      {
        "ref": "v. 54",
        "quote": "“Truly this man was the Son of God!”",
        "commentary": "<p>The centurion’s confession is Matthew’s final answer to the question of Jesus’ identity. It is spoken by a Gentile soldier — a representative of Rome, the very power that executed him — at the foot of the cross, in response to the manner of his death. Not a resurrection, not a miracle of healing — the cross itself provokes the confession. The Son of God is most fully revealed not in power but in self-giving suffering. This is the foolishness of God that is wiser than men (1 Cor 1:25): the victory is achieved at the point of apparent defeat. The centurion sees it. The religious establishment does not. The last shall be first.</p>"
      },
      {
        "ref": "vv. 57–60",
        "quote": "“He rolled a great stone to the entrance of the tomb and went away.”",
        "commentary": "<p>The burial of Jesus is an act of theological importance: he was truly dead, truly buried, “descended into the dead” as the creeds say. This is not a swoon or an apparent death. A great stone is rolled over the entrance; guards are posted (v. 66). The tomb is sealed. In the economy of salvation, the entombment is the nadir — the lowest point in the great descent of the eternal Son: “he humbled himself by becoming obedient to the point of death, even death on a cross” (Phil 2:8). What follows will be the corresponding ascent. But first: the silence of Holy Saturday, the world holding its breath, the stone in place, the guards at their post.</p>"
      }
    ],
    "theology": "<p><strong>The atonement: the cross as the world’s turning point.</strong> Matthew 27 narrates the event that is the hinge of history. Reformed theology has always insisted on the objective reality of what happened at the cross: the wrath of God against sin was exhausted in the person of the Son; the legal debt of humanity was paid; the judgment that was ours was borne by him. This is not one theory among many — it is the heart of the apostolic proclamation. “Christ died for our sins in accordance with the Scriptures” (1 Cor 15:3). The tearing of the veil demonstrates it architecturally: the barrier is gone. The centurion’s confession demonstrates it personally: the cross reveals the Son of God. Every subsequent generation is invited to stand at the foot of the cross and make the centurion’s confession their own.</p>",
    "examples": "<p><strong>Then:</strong> The women who watched from a distance (v. 55), who followed him from Galilee, who served him, who would be the first to the tomb on Sunday morning — they stayed when the disciples fled. Love kept them at the cross when fear drove others away. The crucifixion was not the end of their faith; it was its most costly expression.</p><p><strong>Now:</strong> The cross is the Christian’s only boast (Gal 6:14). Not our moral achievement, not our spiritual progress, not our theological sophistication — the cross of Christ crucified is the one thing on which salvation rests. Charles Spurgeon preached: “I have a great need for Christ; I have a great Christ for my need.” Matthew 27 is the ground of that confidence. The stone rolled over the tomb is the last attempt of human power to contain what cannot be contained.</p>"

  "28": {
    "ref": "Chapter 28",
    "title": "He Is Risen — Go and Make Disciples",
    "text": "<sup>5</sup>But the angel said to the women, “Do not be afraid, for I know that you seek Jesus who was crucified. <sup>6</sup>He is not here, for he has risen, as he said. Come, see the place where he lay. <sup>7</sup>Then go quickly and tell his disciples that he has risen from the dead.” <sup>9</sup>And behold, Jesus met them and said, “Greetings!” And they came up and took hold of his feet and worshiped him. <sup>17</sup>And when they saw him they worshiped him, but some doubted. <sup>18</sup>And Jesus came and said to them, “All authority in heaven and on earth has been given to me. <sup>19</sup>Go therefore and make disciples of all nations, baptizing them in the name of the Father and of the Son and of the Holy Spirit, <sup>20</sup>teaching them to observe all that I have commanded you. And behold, I am with you always, to the end of the age.”",
    "overview": "<p>The Gospel of Matthew ends not with a conclusion but with a commission. The resurrection of Jesus is announced by an angel, confirmed by the empty tomb, and experienced in a personal encounter — the women grasp his feet and worship. Then comes the mountain in Galilee: the eleven, some worshipping and some still doubting, gathered around the risen Lord. And from the mountain — the place where Moses received the law, where Jesus gave the Sermon, where Peter heard “listen to him” — the final and greatest declaration is made: “All authority in heaven and on earth has been given to me.”</p><p>The Great Commission is the Matthew bookend that closes the Emmanuel bracket. In chapter 1, an angel announced “they shall call his name Emmanuel — God with us.” In chapter 28, the risen Lord promises “I am with you always, to the end of the age.” Emmanuel is still with us — not in a manger, not on a cross, but in the risen, enthroned, all-authoritative presence of the Son of God who goes with his people to the ends of the earth. The Gospel does not end; it is sent. The reader is commissioned. Every disciple who has read these twenty-eight chapters is addressed by the last three verses.</p>",
    "verseByVerse": [

        "quote": "“He is not here, for he has risen, as he said.”",
        "commentary": "<p>“As he said.” The resurrection is the verification of every promise Jesus made in this Gospel. He predicted it three times (16:21; 17:23; 20:19). The empty tomb confirms it. The resurrection is not a mythological symbol of spiritual renewal; it is the concrete, historical, bodily event by which the crucified Jesus of Nazareth was raised from the dead by the power of the Father. “Come, see the place where he lay” — the emptiness is the evidence. The grave-cloths were there (John 20:6–7); the body was not. History turned on this morning. Paul is right: if Christ is not raised, our faith is futile and we are still in our sins (1 Cor 15:17). Because he is raised, everything he promised stands.</p>"
      },
      {
        "ref": "v. 9",
        "quote": "“And they came up and took hold of his feet and worshiped him.”",
        "commentary": "<p>The first people to encounter the risen Christ are women — in a culture where women’s testimony was not admissible in court. This is the fingerprint of history rather than invention: no one inventing a resurrection story in first-century Judaism would make women the primary witnesses. The women grab his feet — tangible, physical, embodied — and worship. The resurrection body of Jesus is real, touchable, recognisable, and yet transformed: he appears and disappears, passes through locked doors, and yet eats fish and invites Thomas to touch his wounds. The resurrection is not a ghost story; it is the first instalment of the new creation breaking into the old.</p>"
      },
      {
        "ref": "v. 17",
        "quote": "“And when they saw him they worshiped him, but some doubted.”",
        "commentary": "<p>Matthew does not airbrush the doubt of some disciples from the resurrection account. The Great Commission is given to a group that includes doubters. This is pastorally enormous: the presence of doubt does not disqualify a person from being commissioned. The disciples who doubted still went; still preached; still planted churches across the Roman world. Doubt is not the opposite of faith — unbelief is. Doubt is faith under pressure, asking questions, seeking grounds. The risen Christ does not first resolve the doubts and then commission the believers; he commissions the worshippers-and-doubters together. He knows what they will face; he sends them anyway.</p>"

      {
        "ref": "v. 18",
        "quote": "“All authority in heaven and on earth has been given to me.”",
        "commentary": "<p>This is the most sweeping claim in the Gospel. The authority given to the risen Christ is unlimited in scope — not merely over Israel, not merely over the church, not merely over the spiritual realm, but over all of heaven and all of earth. This is the fulfilment of Daniel 7:14: “to him was given dominion and glory and a kingdom, that all peoples, nations, and languages should serve him.” The Great Commission flows directly from this authority: because he has all authority, his disciples can go to all nations. They do not go in their own strength or by their own permission; they go as ambassadors of the one who already rules. The mission succeeds not because of the missionaries’ skill but because of the King’s authority.</p>"
      },
      {
        "ref": "v. 20",
        "quote": "“I am with you always, to the end of the age.”",
        "commentary": "<p>The last words of Matthew are the answer to the first: “they shall call his name Emmanuel — God with us” (1:23). The Gospel that opened with the announcement of God’s presence closes with the promise of God’s presence. Emmanuel is still with his people — not as a helpless infant in a manger, not as a crucified man on a cross, but as the risen, enthroned, all-authoritative Lord who accompanies his disciples to the ends of the earth. “Always” is the word: not sometimes, not in the easy moments, not when faith is strong, but always — through persecution, through doubt, through the long faithfulness of ordinary days, to the very end of the age. This is the promise on which the entire mission of the church rests.</p>"

    ],
    "theology": "<p><strong>The resurrection as the foundation of everything.</strong> Matthew 28 establishes the resurrection as the ground of mission, authority, and presence. Without the resurrection, the Great Commission has no basis (no authority), no confidence (no living Lord accompanying the missionaries), and no goal (no risen Christ to present to the nations). Reformed theology has always insisted that the resurrection is not a supplement to the cross but its necessary vindication: the cross without the resurrection is a tragedy; the resurrection without the cross is a mystery. Together they are the gospel: he died for our sins and was raised for our justification (Rom 4:25). The risen Christ on the Galilean mountain, commissioning doubting disciples with unlimited authority, is the culmination of the new genesis that began in Matthew 1:1. The biblos geneseos — the book of the new beginning — ends with the world opened to the word of the King.</p>",
    "examples": "<p><strong>Then:</strong> Eleven ordinary men — fishermen, a tax collector, a zealot — were commissioned to disciple all nations. They had no army, no empire, no money, no social status. They had a risen Lord with all authority and a promise of presence. Within a generation the gospel had reached Rome. Within three centuries the Roman Empire had been transformed. The mustard seed had become the tree.</p><p><strong>Now:</strong> The Great Commission has not been rescinded or transferred. Every church, every believer, every generation stands in the Galilean company — some worshipping, some doubting, all commissioned. The command is threefold: go, baptize, teach. The ground is unchanging: all authority belongs to the risen Christ. The promise is absolute: I am with you always. This is enough. It has always been enough. Go.</p>"

  "29": {
    "ref": "About",
    "title": "About This Commentary",
    "overview": "<p>This commentary on the Gospel of Matthew was written by Claude (Anthropic), an AI assistant, as a devotional study guide for personal and small-group use. It follows the Reformed evangelical tradition, drawing on insights from D.A. Carson, R.C. Sproul, John Stott, Timothy Keller, and the broader stream of Reformed biblical theology. The aim throughout is not merely to explain the text but to see Jesus Christ in every chapter &mdash; the King who fulfils, reigns, suffers, and rises.</p><p>Matthew is the Gospel of fulfilment. Every commentary note tries to ask: what is being fulfilled here, and how does it glorify the God who keeps every promise? The Then &amp; Now sections press the text into present life &mdash; because the kingdom of heaven announced in these chapters is the same kingdom advancing today, through the same Spirit, toward the same final consummation.</p><p>Scripture quotations are from the ESV&reg; Bible (The Holy Bible, English Standard Version&reg;), &copy; 2001 by Crossway, a publishing ministry of Good News Publishers. Used by permission. All rights reserved. The ESV text may not be quoted in any publication made available to the public by a Creative Commons license. The ESV may not be translated in whole or in part into any other language.</p>"

}</script>
<script>
const CHAPTERS = JSON.parse(document.getElementById("chdata").textContent);
var currentUnit = 0;

var sel = document.getElementById("unitSelect");
var allKeys = Object.keys(CHAPTERS).map(Number).sort(function(a,b){return a-b;});
allKeys.forEach(function(k){
  var opt = document.createElement("option");
  opt.value = k;
  opt.innerHTML = CHAPTERS[k].ref;
  sel.appendChild(opt);
});

function loadUnit(num) {
  currentUnit = num;
  sel.value = num;
  localStorage.setItem('matthew-pos', num);
  var ch = CHAPTERS[num];
  if (!ch) return;
  var html = "<div class='unit-header'>"
           + "<div class='book'>MATTHEW</div>"
           + "<h1>" + ch.ref + "</h1>"
           + "<div class='subtitle'>" + ch.title + "</div>"
           + "</div>";

  if (ch.text) {
    html += "<details class='passage'><summary>&#128214;&nbsp; Matthew " + ch.ref + " &mdash; ESV</summary><div class='passage-text'>" + ch.text + "</div></details>";
  }

  if (ch.overview) {
    html += "<div class='overview'><div class='ov-label'>Overview</div>" + ch.overview + "</div>";
  }

  if (ch.verseByVerse && ch.verseByVerse.length > 0) {
    html += "<div class='vv-section'><div class='vv-label'>Verse by Verse</div>";
    ch.verseByVerse.forEach(function(v) {
      html += "<div class='vv-entry'><div class='vv-head'>"
            + "<span class='vref'>" + v.ref + "</span>"
            + (v.quote ? " &mdash; <span class='vquote'>" + v.quote + "</span>" : "")
            + "</div><div class='vv-body'>" + v.commentary + "</div></div>";
    });
    html += "</div>";
  }

  if (ch.theology) {
    html += "<div class='theology'><div class='tl-label'>Theology</div>" + ch.theology + "</div>";
  }

  if (ch.examples) {
    html += "<div class='examples'><div class='ex-label'>Examples &mdash; Then &amp; Now</div>" + ch.examples + "</div>";
  }

  var keys = Object.keys(CHAPTERS).map(Number).sort(function(a,b){return a-b;});
  var idx = keys.indexOf(num);
  var prevNum = idx > 0 ? keys[idx-1] : null;
  var nextNum = idx < keys.length-1 ? keys[idx+1] : null;
  html += "<div class='chapter-nav'>"
        + "<button id='prevBtn' class='" + (prevNum !== null ? "" : "hidden") + "'>&#8592; "
        + (prevNum !== null ? CHAPTERS[prevNum].ref : "") + "</button>"
        + "<button id='nextBtn' class='" + (nextNum !== null ? "" : "hidden") + "'>"
        + (nextNum !== null ? CHAPTERS[nextNum].ref : "") + " &#8594;</button>"
        + "</div>";

  document.getElementById("content").innerHTML = html;
  window.scrollTo(0,0);

  var prev = document.getElementById("prevBtn");
  var next = document.getElementById("nextBtn");
  if (prev && prevNum !== null) prev.addEventListener("click", function(){ loadUnit(prevNum); });
  if (next && nextNum !== null) next.addEventListener("click", function(){ loadUnit(nextNum); });
}

document.getElementById("unitSelect").addEventListener("change", function(){ loadUnit(+this.value); });

if (allKeys.length > 0) {
  var saved = localStorage.getItem('matthew-pos');
  loadUnit(saved !== null && CHAPTERS[+saved] ? +saved : allKeys[0]);
}

if ('serviceWorker' in navigator) navigator.serviceWorker.register('./sw.js');
</script>
